# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Get app name
        run: echo "APP_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> $GITHUB_ENV

      - name: Install dependencies
        run: brew install pkg-config

      - run: cargo build --release --target aarch64-apple-darwin

      - run: cargo build --release --target x86_64-apple-darwin

      - run: |
          lipo -create -output $APP_NAME \
            target/aarch64-apple-darwin/release/$APP_NAME \
            target/x86_64-apple-darwin/release/$APP_NAME

      - run: tar czf $APP_NAME-macos-universal.tar.gz $APP_NAME

      - name: Build Homebrew bottle (all tag)
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p bottle/$APP_NAME/$version/bin
          cp $APP_NAME bottle/$APP_NAME/$version/bin/
          tar czf "$APP_NAME-$version.all.bottle.tar.gz" -C bottle $APP_NAME

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APP_NAME }}-macos-universal.tar.gz
            ${{ env.APP_NAME }}-*.all.bottle.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Get app name
        run: echo "APP_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> $GITHUB_ENV

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools rpm

      - name: Build .deb and .rpm
        run: |
          packaging/build-deb.sh
          packaging/build-rpm.sh

      - name: Package static binary tarball
        run: tar czf $APP_NAME-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-musl/release $APP_NAME

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APP_NAME }}-linux-x86_64.tar.gz
            dist/*.deb
            dist/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux]
    permissions:
      contents: read
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: agardenat/homebrew-kdt
          token: ${{ secrets.COMMITTER_TOKEN }}
          path: tap

      - name: Generate multi-platform formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/agardenat/kdt/releases/download/${TAG}"
          gh release download "$TAG" --repo agardenat/kdt \
            --pattern 'kdt-macos-universal.tar.gz' \
            --pattern "kdt-${version}.all.bottle.tar.gz" \
            --dir assets
          src_sha=$(sha256sum assets/kdt-macos-universal.tar.gz | cut -d' ' -f1)
          bottle_sha=$(sha256sum "assets/kdt-${version}.all.bottle.tar.gz" | cut -d' ' -f1)
          mkdir -p tap/Formula
          cat > tap/Formula/kdt.rb <<EOF
          class Kdt < Formula
            desc "Kubernetes diagnostics, events and logs in a terminal UI"
            homepage "https://github.com/agardenat/kdt"
            version "${version}"
            url "${base}/kdt-macos-universal.tar.gz"
            sha256 "${src_sha}"

            depends_on :macos

            bottle do
              root_url "${base}"
              sha256 cellar: :any_skip_relocation, all: "${bottle_sha}"
            end

            def install
              bin.install "kdt"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/kdt --version")
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kdt.rb
          git commit -m "kdt ${version}"
          git push